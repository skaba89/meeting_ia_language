# ── MeetingAI Copilot — Docker Compose ──────────────────────────────
# Complete production-ready stack:
#   - PostgreSQL database
#   - FastAPI backend with Whisper + LLM
#   - Next.js frontend
#
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up -d --build       # Start in background
#   docker compose logs -f backend     # Follow backend logs
#   docker compose down -v             # Stop and remove volumes
#
# Access:
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:8000
#   API Docs:  http://localhost:8000/docs

services:
  # ── PostgreSQL Database ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: meetingai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetingai
      POSTGRES_PASSWORD: meetingai_secret
      POSTGRES_DB: meetingai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetingai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: meetingai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database — PostgreSQL in Docker
      API_DATABASE_URL: postgresql://meetingai:meetingai_secret@db:5432/meetingai
      # JWT
      SECRET_KEY: ${SECRET_KEY:-meetingai-change-this-secret-in-production-2024}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      # AI Services
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-3.5-turbo}
      # Whisper
      WHISPER_MODE: ${WHISPER_MODE:-api}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Translation
      TRANSLATION_ENABLED: "true"
      DEFAULT_TARGET_LANG: en
      # Upload
      MAX_UPLOAD_SIZE_MB: 100
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meetingai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Backend URL for server-side API calls
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
