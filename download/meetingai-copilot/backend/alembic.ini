# Alembic configuration file for MeetingAI Copilot

[alembic]
# Path to migration environment
script_location = app/alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone for the timestamp in migration file names
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchical traversal in revision history
# recursive_version_locations = false

# Default date format for new revision file names
# output_encoding = utf-8

# Database URL – override with DATABASE_URL env var or alembic.ini value
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/meetingai

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
